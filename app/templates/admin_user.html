{% extends "admin_base.html" %}

{% block body %}
<div class="toolbar">
    <div class="layui-form-item">
        <div class="layui-inline">
            <input type="text" id="search-username" placeholder="搜索用户名" class="layui-input" style="width: 250px;">
        </div>
        <div class="layui-inline">
            <select id="search-status" class="layui-input" style="width: 120px; height: 38px;">
                <option value="">全部状态</option>
                <option value="1">正常</option>
                <option value="0">禁用</option>
            </select>
        </div>
        <div class="layui-inline">
            <button class="layui-btn" id="btn-search">
                <i class="fas fa-search"></i> 搜索
            </button>
            <button class="layui-btn layui-btn-normal" id="btn-add">
                <i class="fas fa-plus"></i> 新增用户
            </button>
            <button class="layui-btn layui-btn-danger" id="btn-batch-delete">
                <i class="fas fa-trash-alt"></i> 批量删除
            </button>
        </div>
    </div>
</div>

<div class="table-container">
    <table id="user-table" lay-filter="user-table"></table>
</div>

<script type="text/html" id="toolbar-user">
    <a class="layui-btn layui-btn-xs" lay-event="edit">
        <i class="fas fa-edit"></i> 编辑
    </a>
    <a class="layui-btn layui-btn-danger layui-btn-xs" lay-event="delete">
        <i class="fas fa-trash"></i> 删除
    </a>
</script>

<div id="user-form-dialog" style="display: none; padding: 0;">
    <form class="layui-form" id="user-form" lay-filter="user-form" style="padding: 20px;">
        {% module xsrf_form_html() %}
        <input type="hidden" name="id" id="form-id">
        <div class="layui-form-item">
            <label class="layui-form-label"><i class="required">*</i>用户名</label>
            <div class="layui-input-block">
                <input type="text" name="username" id="form-username" placeholder="请输入用户名" class="layui-input" lay-verify="required" autocomplete="off">
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label"><i class="required">*</i>昵称</label>
            <div class="layui-input-block">
                <input type="text" name="nickname" id="form-nickname" placeholder="请输入昵称" class="layui-input" lay-verify="required" autocomplete="off">
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label"><i class="required">*</i>邮箱</label>
            <div class="layui-input-block">
                <input type="email" name="email" id="form-email" placeholder="请输入邮箱" class="layui-input" lay-verify="required|email" autocomplete="off">
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label"><i class="required">*</i>密码</label>
            <div class="layui-input-block">
                <input type="password" name="password" id="form-password" placeholder="请输入密码" class="layui-input" autocomplete="new-password">
            </div>
        </div>
        <div class="layui-form-item" id="role-item">
            <label class="layui-form-label"><i class="required">*</i>角色</label>
            <div class="layui-input-block">
                <select name="role_id" id="form-role" lay-verify="required">
                    <option value="">请选择角色</option>
                </select>
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label">状态</label>
            <div class="layui-input-block">
                <input type="checkbox" name="status" lay-skin="switch" lay-text="正常|禁用" value="1" checked>
            </div>
        </div>
        <div class="layui-form-item" style="margin-bottom: 0; border-top: 1px solid #e6e6e6; padding-top: 15px; margin-top: 5px;">
            <div class="layui-input-block" style="margin-left: 0;">
                <button class="layui-btn layui-btn-normal" lay-submit lay-filter="form-save" style="width: 120px;">保存</button>
                <button type="button" class="layui-btn layui-btn-primary" id="btn-cancel" style="width: 80px;">取消</button>
            </div>
        </div>
    </form>
</div>
{% end %}

{% block scripts %}
<script>
    layui.use(['table', 'form', 'layer', 'jquery'], function(){
        var table = layui.table;
        var form = layui.form;
        var layer = layui.layer;
        var $ = layui.jquery;
        var currentUsername = "{{ username }}";

        var $userMenu = $('.sidebar-menu li:has(a:contains("系统管理"))');
        var $userList = $('.sidebar-menu li:has(a:contains("用户管理"))');
        if(!$userMenu.hasClass('active')){
            $('.sidebar-menu li').removeClass('active');
            $userMenu.addClass('active');
        }
        $userMenu.find('.submenu').show();
        if(!$userList.hasClass('active')){
            $userList.addClass('active');
        }

        table.render({
            elem: '#user-table',
            url: '/admin/api/user/list',
            method: 'get',
            page: {
                limit: 20,
                limits: [10, 20, 50, 100],
                layout: ['count', 'prev', 'page', 'next', 'limits', 'skip']
            },
            cols: [[
                {type: 'checkbox', fixed: 'left'},
                {field: 'id', title: 'ID', width: 80, sort: true, fixed: 'left'},
                {field: 'username', title: '用户名', width: 180},
                {field: 'nickname', title: '昵称', width: 140, templet: function(d){ return d.nickname || '-'; }},
                {field: 'email', title: '邮箱', width: 200, templet: function(d){ return d.email || '-'; }},
                {field: 'role_name', title: '角色', width: 150},
                {field: 'status', title: '状态', width: 100, templet: function(d){
                    return d.status === 1 ? '<span class="layui-badge layui-bg-green">正常</span>' : '<span class="layui-badge layui-bg-gray">禁用</span>';
                }},
                {field: 'last_login_at', title: '最后登录时间', width: 180, templet: function(d){
                    return formatDateTime(d.last_login_at);
                }},
                {field: 'create_at', title: '创建时间', width: 180, templet: function(d){
                    return formatDateTime(d.create_at);
                }},
                {title: '操作', width: 220, fixed: 'right', templet: function(d){
                    if(d.username === 'admin'){
                        return '<a class="layui-btn layui-btn-xs" lay-event="edit"><i class="fas fa-key"></i> 改密码</a>';
                    }
                    return '<a class="layui-btn layui-btn-xs" lay-event="edit"><i class="fas fa-edit"></i> 编辑</a>' +
                           '<a class="layui-btn layui-btn-danger layui-btn-xs" lay-event="delete"><i class="fas fa-trash"></i> 删除</a>';
                }}
            ]],
            parseData: function(res){
                return {
                    "code": res.code,
                    "msg": res.msg,
                    "count": res.data.total,
                    "data": res.data.list
                };
            },
            cellMinWidth: 80
        });

        function formatDateTime(value){
            if(!value){
                return '-';
            }
            var date = new Date(String(value).replace(' ', 'T'));
            if(isNaN(date.getTime())){
                return value;
            }
            var year = date.getFullYear();
            var month = (date.getMonth() + 1).toString().padStart(2, '0');
            var day = date.getDate().toString().padStart(2, '0');
            var hour = date.getHours().toString().padStart(2, '0');
            var minute = date.getMinutes().toString().padStart(2, '0');
            return year + '-' + month + '-' + day + ' ' + hour + ':' + minute;
        }

        function loadRoleOptions(selectedRoleId, callback){
            $.get('/admin/api/role/list', {page: 1, limit: 1000}, function(res){
                var options = '<option value="">请选择角色</option>';
                if(res.code === 0 && res.data && res.data.list){
                    $.each(res.data.list, function(i, role){
                        if(role.status !== 1){
                            return;
                        }
                        var selected = String(role.id) === String(selectedRoleId) || (!selectedRoleId && role.name === 'user') ? ' selected' : '';
                        options += '<option value="' + role.id + '"' + selected + '>' + role.display_name + '</option>';
                    });
                }
                $('#form-role').html(options);
                form.render('select');
                if(callback){
                    callback();
                }
            });
        }

        $('#btn-search').on('click', function(){
            var username = $('#search-username').val();
            var status = $('#search-status').val();
            table.reload('user-table', {
                where: {username: username, status: status},
                page: {curr: 1}
            });
        });

        $('#btn-add').on('click', function(){
            $('#user-form')[0].reset();
            $('#form-id').val('');
            $('#form-username').prop('readonly', false);
            $('#form-nickname').prop('readonly', false);
            $('#form-email').prop('readonly', false);
            $('#form-password').attr('placeholder', '请输入密码').attr('lay-verify', 'required');
            $('#form-role').prop('disabled', false);
            $('input[name="status"]').prop('disabled', false);
            $('input[name="status"]').prop('checked', true);
            loadRoleOptions('', function(){
                form.render();
                layer.open({
                    type: 1,
                    title: '<i class="fas fa-user-plus" style="margin-right:8px;"></i>新增用户',
                    area: ['520px', '560px'],
                    skin: 'layui-layer-admin',
                    content: $('#user-form-dialog')
                });
            });
        });

        $('#btn-cancel').on('click', function(){
            layer.closeAll();
        });

        form.on('submit(form-save)', function(data){
            var formData = data.field;
            var url = formData.id ? '/admin/api/user/update' : '/admin/api/user/add';

            $.post(url, formData, function(res){
                if(res.code === 0){
                    layer.msg(res.msg, {icon: 1});
                    layer.closeAll();
                    table.reload('user-table');
                } else {
                    layer.msg(res.msg, {icon: 2});
                }
            });
            return false;
        });

        table.on('tool(user-table)', function(obj){
            var data = obj.data;
            if(obj.event === 'edit'){
                $('#form-id').val(data.id);
                $('#form-username').val(data.username);
                $('#form-nickname').val(data.nickname || '');
                $('#form-email').val(data.email || '');
                $('#form-password').val('').attr('placeholder', data.username === 'admin' ? '请输入新密码' : '留空表示不修改密码');
                $('input[name="status"]').prop('checked', data.status === 1);

                if(data.username === 'admin'){
                    $('#form-username').prop('readonly', true);
                    $('#form-nickname').prop('readonly', true);
                    $('#form-email').prop('readonly', true);
                    $('#form-password').attr('lay-verify', 'required');
                    $('#form-role').prop('disabled', true);
                    $('input[name="status"]').prop('disabled', true);
                } else {
                    $('#form-username').prop('readonly', false);
                    $('#form-nickname').prop('readonly', false);
                    $('#form-email').prop('readonly', false);
                    $('#form-password').removeAttr('lay-verify');
                    $('#form-role').prop('disabled', false);
                    $('input[name="status"]').prop('disabled', false);
                }

                loadRoleOptions(data.role_id, function(){
                    form.render();
                    layer.open({
                        type: 1,
                        title: data.username === 'admin' ? '<i class="fas fa-key" style="margin-right:8px;"></i>修改admin密码' : '<i class="fas fa-edit" style="margin-right:8px;"></i>编辑用户',
                        area: ['520px', '560px'],
                        skin: 'layui-layer-admin',
                        content: $('#user-form-dialog')
                    });
                });
            } else if(obj.event === 'delete'){
                if(data.username === currentUsername){
                    layer.msg('当前登录账户不能删除，请先切换到其他管理员账户', {icon: 0});
                    return;
                }

                layer.confirm('确定要删除用户 <strong>' + data.username + '</strong> 吗？<br><span style="color:#999;font-size:12px;">删除后无法恢复，请谨慎操作。</span>', {
                    icon: 3,
                    title: '<i class="fas fa-exclamation-triangle" style="margin-right:8px;color:#ff0000;"></i>删除确认',
                    btn: ['确定删除', '取消'],
                    yes: function(index){
                        var xsrf = window.getXsrfToken ? window.getXsrfToken() : $('input[name="_xsrf"]').val();
                        var loading = layer.load(2, {shade: [0.12, '#fff']});
                        $.post('/admin/api/user/delete', {id: data.id, _xsrf: xsrf}, function(res){
                            if(res.code === 0){
                                layer.msg(res.msg, {icon: 1});
                                obj.del();
                                table.reload('user-table', {page: {curr: 1}});
                            } else {
                                layer.msg(res.msg, {icon: 2});
                            }
                        }).fail(function(xhr){
                            layer.msg('删除请求失败：' + (xhr.responseText || xhr.status), {icon: 2});
                        }).always(function(){
                            layer.close(loading);
                        });
                        layer.close(index);
                    }
                });
            }
        });

        $('#btn-batch-delete').on('click', function(){
            var checkStatus = table.checkStatus('user-table');
            var ids = checkStatus.data.map(function(item){
                return item.id;
            });
            var hasCurrentUser = checkStatus.data.some(function(item){
                return item.username === currentUsername;
            });
            if(ids.length === 0){
                layer.msg('请选择要删除的用户', {icon: 0});
                return;
            }
            if(hasCurrentUser){
                layer.msg('批量删除不能包含当前登录账户，请取消勾选当前账户', {icon: 0});
                return;
            }
            layer.confirm('确定要删除选中的 <strong>' + ids.length + '</strong> 个用户吗？<br><span style="color:#999;font-size:12px;">删除后无法恢复，请谨慎操作。</span>', {
                icon: 3,
                title: '<i class="fas fa-exclamation-triangle" style="margin-right:8px;color:#ff0000;"></i>批量删除确认',
                btn: ['确定删除', '取消'],
                yes: function(index){
                    var xsrf = window.getXsrfToken ? window.getXsrfToken() : $('input[name="_xsrf"]').val();
                    var loading = layer.load(2, {shade: [0.12, '#fff']});
                    $.post('/admin/api/user/batch-delete', {ids: JSON.stringify(ids), _xsrf: xsrf}, function(res){
                        if(res.code === 0){
                            layer.msg(res.msg, {icon: 1});
                            table.reload('user-table', {page: {curr: 1}});
                        } else {
                            layer.msg(res.msg, {icon: 2});
                        }
                    }).fail(function(xhr){
                        layer.msg('批量删除请求失败：' + (xhr.responseText || xhr.status), {icon: 2});
                    }).always(function(){
                        layer.close(loading);
                    });
                    layer.close(index);
                }
            });
        });

        $(document).on('keyup', '#search-username', function(e){
            if(e.keyCode === 13){
                $('#btn-search').click();
            }
        });

        form.render('select');
    });
</script>
<style>
.required {
    color: #ff0000;
    margin-right: 2px;
}

.layui-table-cell {
    height: auto;
    overflow: visible;
}

.layui-table-cell .layui-btn {
    margin-right: 4px;
}
</style>
{% end %}
