{% extends "admin_base.html" %}

{% block body %}
<div class="toolbar">
    <div class="layui-form-item">
        <div class="layui-inline">
            <input type="text" id="search-keyword" placeholder="搜索关键字、标题、摘要、来源" class="layui-input" style="width: 300px;">
        </div>
        <div class="layui-inline">
            <button class="layui-btn" id="btn-search"><i class="fas fa-search"></i> 搜索</button>
            <button class="layui-btn layui-btn-danger" id="btn-batch-delete"><i class="fas fa-trash"></i> 批量删除</button>
            <button class="layui-btn layui-btn-warm" id="btn-ai-deep"><i class="fas fa-robot"></i> AI深度采集</button>
            <button class="layui-btn layui-btn-normal" id="btn-back-source"><i class="fas fa-binoculars"></i> 瞭望管理</button>
        </div>
    </div>
</div>

<div class="layui-card">
    <div class="layui-card-header">采集入库数据</div>
    <div class="layui-card-body" style="padding:0;">
        <div class="table-container">
            <table id="warehouse-table" lay-filter="warehouse-table"></table>
        </div>
    </div>
</div>

<script type="text/html" id="warehouse-toolbar">
    <a class="layui-btn layui-btn-danger layui-btn-xs" lay-event="delete"><i class="fas fa-trash"></i> 删除</a>
    <a class="layui-btn layui-btn-warm layui-btn-xs" lay-event="deep"><i class="fas fa-robot"></i> AI深采</a>
</script>
{% end %}

{% block scripts %}
<script>
layui.use(['table', 'jquery', 'layer'], function(){
    var table = layui.table;
    var $ = layui.jquery;
    var layer = layui.layer;

    var $menu = $('.sidebar-menu li:has(a:contains("数据管理"))');
    $('.sidebar-menu li').removeClass('active');
    $menu.addClass('active');
    $menu.find('.submenu').show();
    $menu.find('.submenu a:contains("数据仓库")').parent().addClass('active');

    function reloadTable() {
        table.reload('warehouse-table', {
            where: {keyword: $('#search-keyword').val()},
            page: {curr: 1}
        });
    }

    function deepMessage() {
        layer.msg('AI深度采集将在后续任务中完成，这里先保留入口。', {icon: 0, time: 2500});
    }

    table.render({
        elem: '#warehouse-table',
        id: 'warehouse-table',
        url: '/admin/api/data/warehouse/list',
        page: {limit: 20, limits: [20, 50, 100]},
        cols: [[
            {type: 'checkbox', width: 50},
            {field: 'source_name', title: '来源', width: 150},
            {field: 'keyword', title: '关键字', width: 140, templet: function(d){ return d.keyword || '-'; }},
            {field: 'title', title: '标题', minWidth: 280},
            {field: 'summary', title: '摘要', minWidth: 320, templet: function(d){ return d.summary || '-'; }},
            {field: 'content_url', title: '原文链接', minWidth: 180, templet: function(d){
                if(!d.content_url){ return '-'; }
                return '<a href="' + d.content_url + '" target="_blank" style="color:#1e9fff;">查看原文</a>';
            }},
            {field: 'published_at', title: '发布时间', width: 160, templet: function(d){ return d.published_at || '-'; }},
            {field: 'create_at', title: '入库时间', width: 170},
            {title: '操作', width: 150, toolbar: '#warehouse-toolbar', fixed: 'right'}
        ]],
        parseData: function(res){
            return {code: res.code, msg: res.msg, count: res.data.total, data: res.data.list};
        }
    });

    table.on('tool(warehouse-table)', function(obj){
        var data = obj.data;
        if(obj.event === 'delete'){
            layer.confirm('确定删除这条采集记录吗？', function(index){
                $.post('/admin/api/data/warehouse/delete', {id: data.id, _xsrf: window.getXsrfToken()}, function(res){
                    layer.msg(res.msg, {icon: res.code === 0 ? 1 : 2});
                    if(res.code === 0){
                        reloadTable();
                    }
                });
                layer.close(index);
            });
        } else if(obj.event === 'deep'){
            deepMessage();
        }
    });

    $('#btn-search').on('click', reloadTable);
    $('#btn-back-source').on('click', function(){ window.location.href = '/admin/lookout/source'; });
    $('#btn-ai-deep').on('click', deepMessage);
    $('#btn-batch-delete').on('click', function(){
        var checkStatus = table.checkStatus('warehouse-table');
        var ids = (checkStatus.data || []).map(function(item){ return item.id; });
        if(!ids.length){
            layer.msg('请至少选择一条记录', {icon: 0});
            return;
        }
        layer.confirm('确定批量删除选中的 ' + ids.length + ' 条记录吗？', function(index){
            $.post('/admin/api/data/warehouse/batch-delete', {
                ids: ids.join(','),
                _xsrf: window.getXsrfToken()
            }, function(res){
                layer.msg(res.msg, {icon: res.code === 0 ? 1 : 2});
                if(res.code === 0){
                    reloadTable();
                }
            });
            layer.close(index);
        });
    });

    $(document).on('keyup', '#search-keyword', function(e){ if(e.keyCode === 13){ reloadTable(); } });
});
</script>
{% end %}
