<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <link rel="stylesheet" href="{{ static_url('libs/layui-v2.13.6/layui/css/layui.css') }}">
    <link rel="stylesheet" href="{{ static_url('libs/fontawesome-free-5.15.4-web/css/all.min.css') }}">
    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            min-height: 100%;
            margin: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
            background: #ececec;
            color: #2e3b48;
        }

        .login-page {
            position: relative;
            min-height: 100vh;
            padding: 34px;
            overflow: hidden;
        }

        .login-shell {
            position: relative;
            z-index: 1;
            min-height: calc(100vh - 68px);
            display: grid;
            grid-template-columns: minmax(420px, 1fr) minmax(430px, 0.7fr);
            align-items: center;
            gap: 48px;
            padding: 58px 76px;
            background: rgba(255, 255, 255, 0.88);
            border-radius: 18px;
            overflow: hidden;
        }

        .blob {
            position: absolute;
            pointer-events: none;
            opacity: 0.9;
        }

        .blob-green {
            width: 540px;
            height: 540px;
            left: -70px;
            top: -70px;
            border-radius: 50%;
            background: rgba(110, 237, 168, 0.24);
        }

        .blob-blue {
            width: 460px;
            height: 210px;
            right: 165px;
            top: -28px;
            border-radius: 120px 120px 34px 34px;
            transform: rotate(-4deg);
            background: rgba(90, 117, 236, 0.16);
        }

        .blob-corner {
            width: 210px;
            height: 250px;
            right: -80px;
            bottom: 110px;
            border-radius: 120px 0 0 120px;
            background: rgba(95, 198, 136, 0.28);
        }

        .blob-pill {
            width: 245px;
            height: 92px;
            left: 315px;
            bottom: -40px;
            border-radius: 999px;
            transform: rotate(45deg);
            background: linear-gradient(90deg, rgba(65, 87, 234, 0.9), rgba(202, 214, 255, 0.85));
        }

        .top-actions {
            position: absolute;
            top: 28px;
            right: 28px;
            display: flex;
            align-items: center;
            gap: 18px;
            color: #59616a;
            font-size: 20px;
            z-index: 2;
        }

        .theme-switch {
            width: 58px;
            height: 30px;
            display: inline-flex;
            align-items: center;
            justify-content: space-between;
            padding: 4px 8px;
            border-radius: 999px;
            background: #e0e4ec;
            color: #fff;
            font-size: 14px;
        }

        .theme-switch::before {
            content: "";
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: #fff;
            box-shadow: 0 2px 7px rgba(34, 45, 58, 0.14);
        }

        .illustration {
            position: relative;
            min-width: 0;
        }

        .illustration img {
            display: block;
            width: min(880px, 100%);
            margin: 0 auto;
            filter: drop-shadow(0 34px 38px rgba(52, 99, 190, 0.18));
        }

        .login-card {
            width: min(100%, 520px);
            justify-self: center;
            padding: 64px 58px 56px;
            background: rgba(255, 255, 255, 0.96);
            border-radius: 14px;
            box-shadow: 0 10px 34px rgba(43, 57, 77, 0.13);
        }

        .brand {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 22px;
            margin-bottom: 52px;
        }

        .brand-mark {
            width: 64px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 18px;
            background: #326fe6;
            color: #fff;
            font-size: 34px;
            font-weight: 700;
            box-shadow: inset 0 -8px 0 rgba(0, 0, 0, 0.08);
            transform: rotate(45deg);
        }

        .brand-mark span {
            transform: rotate(-45deg);
        }

        .brand-name {
            font-size: 44px;
            line-height: 1;
            font-weight: 700;
            letter-spacing: 0;
            color: #314151;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 22px;
        }

        .form-group {
            position: relative;
        }

        .form-group i {
            position: absolute;
            left: 25px;
            top: 50%;
            transform: translateY(-50%);
            color: #a8afb8;
            font-size: 18px;
        }

        .form-group input {
            width: 100%;
            height: 58px;
            padding: 0 22px 0 58px;
            border: 1px solid #d7dde8;
            border-radius: 5px;
            outline: 0;
            background: #fff;
            color: #4b5563;
            font-size: 18px;
            font-weight: 600;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .form-group input::placeholder {
            color: #b7bdc7;
            font-weight: 600;
        }

        .form-group input:focus {
            border-color: #326fe6;
            box-shadow: 0 0 0 3px rgba(50, 111, 230, 0.1);
        }

        .error-msg {
            display: flex;
            align-items: center;
            gap: 9px;
            margin: -24px 0 22px;
            padding: 12px 14px;
            border: 1px solid #ffd2d2;
            border-radius: 5px;
            background: #fff5f5;
            color: #d64545;
            font-size: 14px;
        }

        .action-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px;
            margin-top: 20px;
        }

        .login-btn,
        .reset-btn {
            height: 58px;
            border-radius: 999px;
            border: 0;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
        }

        .login-btn {
            color: #fff;
            background: #3c66a0;
            box-shadow: 0 8px 18px rgba(60, 102, 160, 0.22);
        }

        .login-btn:hover {
            background: #335a91;
            transform: translateY(-1px);
            box-shadow: 0 12px 24px rgba(60, 102, 160, 0.28);
        }

        .reset-btn {
            color: #606a76;
            background: #fff;
            border: 1px solid #d7dde8;
        }

        .reset-btn:hover {
            color: #326fe6;
            border-color: #b8c7e6;
        }

        .login-btn i,
        .reset-btn i {
            margin-right: 10px;
        }

        @media (max-width: 1100px) {
            .login-shell {
                grid-template-columns: 1fr;
                gap: 24px;
                padding: 42px 28px;
            }

            .illustration {
                display: none;
            }
        }

        @media (max-width: 640px) {
            .login-page {
                padding: 14px;
            }

            .login-shell {
                min-height: calc(100vh - 28px);
                padding: 28px 16px;
            }

            .top-actions {
                top: 18px;
                right: 18px;
            }

            .login-card {
                padding: 54px 20px 28px;
            }

            .brand {
                gap: 14px;
                margin-bottom: 38px;
            }

            .brand-mark {
                width: 50px;
                height: 50px;
                border-radius: 14px;
                font-size: 26px;
            }

            .brand-name {
                font-size: 34px;
            }

            .action-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <main class="login-page">
        <section class="login-shell">
            <div class="blob blob-green"></div>
            <div class="blob blob-blue"></div>
            <div class="blob blob-corner"></div>
            <div class="blob blob-pill"></div>

            <div class="top-actions" aria-hidden="true">
                <i class="fas fa-language"></i>
                <span class="theme-switch"><i class="fas fa-moon"></i></span>
            </div>

            <div class="illustration">
                <img src="{{ static_url('images/admin-login-illustration.png') }}" alt="cnAgentOS">
            </div>

            <div class="login-card">
                <div class="brand">
                    <div class="brand-mark"><span>C</span></div>
                    <div class="brand-name">cnAgentOS</div>
                </div>

                {% if error %}
                <div class="error-msg">
                    <i class="fas fa-exclamation-circle"></i>
                    <span>{{ error }}</span>
                </div>
                {% end %}

                <form class="login-form" method="post" action="/admin/auth/login">
                    {% module xsrf_form_html() %}
                    <div class="form-group">
                        <i class="far fa-user"></i>
                        <input type="text" name="username" placeholder="admin" autocomplete="username" value="admin">
                    </div>
                    <div class="form-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" name="password" placeholder="初始密码：admin888" autocomplete="current-password" value="admin888">
                    </div>
                    <input type="hidden" name="remember" value="on">
                    <div class="action-row">
                        <button type="reset" class="reset-btn">
                            <i class="far fa-times-circle"></i>重置
                        </button>
                        <button type="submit" class="login-btn">
                            <i class="fas fa-user"></i>登录
                        </button>
                    </div>
                </form>
            </div>
        </section>
    </main>

    <script src="{{ static_url('libs/layui-v2.13.6/layui/layui.js') }}"></script>
    <script>
        layui.use(['layer'], function(){
            var layer = layui.layer;
            document.querySelector('.login-form').addEventListener('submit', function(){
                layer.load(2, {shade: [0.12, '#fff']});
            });
        });
    </script>
</body>
</html>
