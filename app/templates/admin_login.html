<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <link rel="stylesheet" href="{{ static_url('libs/layui-v2.13.6/layui/css/layui.css') }}">
    <link rel="stylesheet" href="{{ static_url('libs/fontawesome-free-5.15.4-web/css/all.min.css') }}">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 50%, #f0f2f5 100%);
            overflow: hidden;
        }

        .login-container {
            display: flex;
            height: 100vh;
            position: relative;
        }

        .left-section {
            flex: 1;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .bg-decoration {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .bg-circle {
            position: absolute;
            border-radius: 50%;
            opacity: 0.6;
            animation: float 6s ease-in-out infinite;
        }

        .bg-circle.c1 {
            width: 400px;
            height: 400px;
            background: linear-gradient(135deg, #00d4ff 0%, #0099ff 100%);
            top: -100px;
            left: -100px;
            animation-delay: 0s;
        }

        .bg-circle.c2 {
            width: 300px;
            height: 300px;
            background: linear-gradient(135deg, #52c41a 0%, #389e0d 100%);
            bottom: -50px;
            right: 100px;
            animation-delay: 2s;
        }

        .bg-circle.c3 {
            width: 200px;
            height: 200px;
            background: linear-gradient(135deg, #722ed1 0%, #531dab 100%);
            top: 50%;
            right: -50px;
            animation-delay: 4s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }

        .illustration {
            position: relative;
            z-index: 10;
            animation: fadeInUp 1s ease-out;
        }

        .isometric-box {
            position: relative;
            width: 300px;
            height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cube-wrapper {
            position: relative;
            perspective: 1000px;
        }

        .cube {
            width: 120px;
            height: 120px;
            position: relative;
            transform-style: preserve-3d;
            animation: rotateCube 8s infinite linear;
        }

        @keyframes rotateCube {
            0% { transform: rotateX(-20deg) rotateY(0deg); }
            100% { transform: rotateX(-20deg) rotateY(360deg); }
        }

        .cube-face {
            position: absolute;
            width: 120px;
            height: 120px;
            background: rgba(0, 212, 255, 0.2);
            border: 2px solid rgba(0, 212, 255, 0.5);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: #0099ff;
        }

        .cube-face.front { transform: rotateY(0deg) translateZ(60px); }
        .cube-face.back { transform: rotateY(180deg) translateZ(60px); }
        .cube-face.right { transform: rotateY(90deg) translateZ(60px); }
        .cube-face.left { transform: rotateY(-90deg) translateZ(60px); }
        .cube-face.top { transform: rotateX(90deg) translateZ(60px); }
        .cube-face.bottom { transform: rotateX(-90deg) translateZ(60px); }

        .floating-blocks {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .block {
            position: absolute;
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.3), rgba(82, 196, 26, 0.3));
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            animation: blockFloat 4s ease-in-out infinite;
        }

        .block.b1 { width: 60px; height: 60px; top: 20%; left: 10%; animation-delay: 0s; }
        .block.b2 { width: 40px; height: 40px; top: 30%; right: 20%; animation-delay: 1s; }
        .block.b3 { width: 50px; height: 50px; bottom: 30%; left: 15%; animation-delay: 2s; }
        .block.b4 { width: 35px; height: 35px; bottom: 20%; right: 15%; animation-delay: 3s; }

        @keyframes blockFloat {
            0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0.6; }
            50% { transform: translateY(-15px) rotate(5deg); opacity: 0.9; }
        }

        .text-decoration {
            position: absolute;
            bottom: 60px;
            left: 60px;
            z-index: 10;
        }

        .text-decoration h1 {
            font-size: 36px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 10px;
            animation: fadeInLeft 0.8s ease-out;
        }

        .text-decoration p {
            font-size: 16px;
            color: #666;
            animation: fadeInLeft 0.8s ease-out 0.2s both;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInLeft {
            from { opacity: 0; transform: translateX(-30px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .right-section {
            width: 420px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            box-shadow: -10px 0 40px rgba(0, 0, 0, 0.05);
        }

        .login-card {
            width: 100%;
            animation: fadeInRight 0.8s ease-out;
        }

        @keyframes fadeInRight {
            from { opacity: 0; transform: translateX(30px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo {
            width: 64px;
            height: 64px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, #00d4ff 0%, #0099ff 100%);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: #fff;
            font-weight: 700;
            box-shadow: 0 8px 24px rgba(0, 153, 255, 0.3);
        }

        .login-header h2 {
            font-size: 24px;
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 8px;
        }

        .login-header p {
            font-size: 14px;
            color: #999;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-group {
            position: relative;
        }

        .form-group .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
            font-size: 16px;
            z-index: 10;
        }

        .form-group input {
            width: 100%;
            height: 48px;
            padding: 0 16px 0 48px;
            border: 1px solid #e8e8e8;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s ease;
            background: #fafafa;
            outline: none;
        }

        .form-group input:focus {
            border-color: #0099ff;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(0, 153, 255, 0.1);
        }

        .form-group input::placeholder {
            color: #bbb;
        }

        .form-group input:hover {
            border-color: #ccc;
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 8px;
        }

        .form-options label {
            display: flex;
            align-items: center;
            cursor: pointer;
            font-size: 13px;
            color: #666;
        }

        .form-options input[type="checkbox"] {
            width: 16px;
            height: 16px;
            margin-right: 8px;
            accent-color: #0099ff;
        }

        .form-options a {
            font-size: 13px;
            color: #0099ff;
            text-decoration: none;
        }

        .form-options a:hover {
            text-decoration: underline;
        }

        .btn-primary {
            width: 100%;
            height: 48px;
            background: linear-gradient(135deg, #1a1a2e 0%, #0f3460 100%);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(15, 52, 96, 0.4);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            width: 100%;
            height: 48px;
            background: #fff;
            border: 1px solid #e8e8e8;
            border-radius: 10px;
            color: #666;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-secondary:hover {
            border-color: #0099ff;
            color: #0099ff;
        }

        .error-msg {
            background: #fff2f0;
            border: 1px solid #ffccc7;
            color: #ff4d4f;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .login-footer {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #f0f0f0;
        }

        .login-footer p {
            font-size: 13px;
            color: #999;
        }

        .login-footer a {
            color: #0099ff;
            text-decoration: none;
        }

        .login-footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            .login-container {
                flex-direction: column;
            }

            .left-section {
                display: none;
            }

            .right-section {
                width: 100%;
                height: 100vh;
                box-shadow: none;
            }

            .login-card {
                width: 100%;
                max-width: 360px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="left-section">
            <div class="bg-decoration">
                <div class="bg-circle c1"></div>
                <div class="bg-circle c2"></div>
                <div class="bg-circle c3"></div>
            </div>

            <div class="floating-blocks">
                <div class="block b1"></div>
                <div class="block b2"></div>
                <div class="block b3"></div>
                <div class="block b4"></div>
            </div>

            <div class="illustration">
                <div class="isometric-box">
                    <div class="cube-wrapper">
                        <div class="cube">
                            <div class="cube-face front"><i class="fas fa-chart-line"></i></div>
                            <div class="cube-face back"><i class="fas fa-brain"></i></div>
                            <div class="cube-face right"><i class="fas fa-cloud"></i></div>
                            <div class="cube-face left"><i class="fas fa-database"></i></div>
                            <div class="cube-face top"><i class="fas fa-cpu"></i></div>
                            <div class="cube-face bottom"><i class="fas fa-network-wired"></i></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="text-decoration">
                <h1>AI智能瞭望系统</h1>
                <p>智能问数 · 数据洞察 · 智慧决策</p>
            </div>
        </div>

        <div class="right-section">
            <div class="login-card">
                <div class="login-header">
                    <div class="logo">
                        <i class="fas fa-chart-line"></i>
                    </div>
                    <h2>cnAgentOS</h2>
                    <p>AI智能瞭望与智能问数系统</p>
                </div>

                {% if error %}
                <div class="error-msg">
                    <i class="fas fa-exclamation-circle"></i>{{ error }}
                </div>
                {% end %}

                <form class="login-form" method="post" action="/admin/auth/login">
                    <div class="form-group">
                        <i class="fas fa-user input-icon"></i>
                        <input type="text" name="username" placeholder="请输入用户名" autocomplete="username" value="admin">
                    </div>

                    <div class="form-group">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" name="password" placeholder="请输入密码" autocomplete="current-password" value="admin888">
                    </div>

                    <div class="form-options">
                        <label>
                            <input type="checkbox" name="remember" checked>
                            <span>记住我</span>
                        </label>
                        <a href="javascript:;">忘记密码?</a>
                    </div>

                    <button type="submit" class="btn-primary">
                        <i class="fas fa-sign-in-alt"></i> 登录系统
                    </button>

                    {% module xsrf_form_html() %}
                </form>

                <div class="login-footer">
                    <p>© 2026 cnAgentOS. All rights reserved.</p>
                </div>
            </div>
        </div>
    </div>

    <script src="{{ static_url('libs/layui-v2.13.6/layui/layui.js') }}"></script>
    <script>
        layui.use(['form', 'layer'], function(){
            var form = layui.form;
            var layer = layui.layer;

            form.on('submit', function(data){
                var loading = layer.load(2, {shade: [0.3, '#000']});
                setTimeout(function(){
                    layer.close(loading);
                }, 1000);
                return true;
            });
        });
    </script>
</body>
</html>
